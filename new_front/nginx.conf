server {
    listen 80;
    client_max_body_size 0;
    
    # Long-term cache for Vite-hashed static assets (JS, CSS)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images and fonts
    location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg|woff2?|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the api container
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for large file uploads (chunks)
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # Pass through content length for proper upload tracking
        proxy_set_header Content-Length $content_length;
    }

    # Proxy uploads requests to the api container (so MinIO proxy works)
    location ^~ /uploads/ {
        proxy_pass http://api:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Bypassing Express for all /uploads/videos/ (Massive Speedup)
    location ^~ /uploads/videos/ {
        # Strip /uploads/videos/ and proxy to /hls-videos/
        rewrite ^/uploads/videos/(.*)$ /hls-videos/$1 break;
        proxy_pass http://minio:9000;
        
        # Use HTTP 1.1 for keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;

        # Enable extreme Edge caching headers (Cloudflare)
        add_header 'Cache-Control' 'public, max-age=2592000, s-maxage=2592000, immutable' always;

        # Hide MinIO's original headers that might conflict
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # CORS Headers for browser playback (HLS.js)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Range';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
