proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:10m max_size=10g inactive=30d;

server {
    listen 80;
    server_name localhost;

    # ─── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ─── React SPA ─────────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache index.html (always fresh)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── Static assets (JS/CSS bundles) — hashed filenames, long cache ─────────
    location ~* \.(js|css|woff2|woff|ttf|eot|svg|ico|png|jpg|gif|webp)$ {
        try_files $uri @backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        client_max_body_size 2g;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }

    # ─── Uploads (videos + images) — cached by nginx ───────────────────────────
    location /uploads/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Range $http_range;
        proxy_set_header   If-Range $http_if_range;

        # Disable cache when client requests a specific byte range
        proxy_cache_bypass $http_range;
        proxy_no_cache     $http_range;

        # Nginx proxy cache
        proxy_cache        media_cache;
        proxy_cache_key    "$scheme$request_method$host$request_uri";
        proxy_cache_valid  200 30d;
        proxy_cache_valid  404 1m;
        add_header         X-Cache-Status $upstream_cache_status;

        # Pass range headers for video seeking
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Backend fallback for static assets ────────────────────────────────────
    location @backend {
        proxy_pass http://backend:3001;
    }
}
