worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 500M;

    # Caching configuration
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=hls_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Bot user-agent detection for SEO prerendering
    map $http_user_agent $is_bot {
        default 0;
        ~*googlebot 1;
        ~*bingbot 1;
        ~*yandexbot 1;
        ~*baiduspider 1;
        ~*facebookexternalhit 1;
        ~*twitterbot 1;
        ~*whatsapp 1;
        ~*telegrambot 1;
        ~*linkedinbot 1;
        ~*slackbot 1;
        ~*discordbot 1;
        ~*pinterest 1;
        ~*semrushbot 1;
        ~*ahrefsbot 1;
        ~*dotbot 1;
        ~*mj12bot 1;
    }

    # IP ile erişimi engelle — sadece izin verilen domain'ler
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 80;
        server_name onlymix.tube www.onlymix.tube localhost;

        # Serve HLS video segments
        location /hls/ {
            # Proxy to MinIO hls-videos bucket (using internal DNS name and port)
            proxy_pass http://minio:9000/hls-videos/;
            
            # Use HTTP 1.1 for keepalive
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Headers for correct caching
            proxy_set_header Host $http_host;

            # Enable caching
            proxy_cache hls_cache;
            proxy_cache_valid 200 60m;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            proxy_cache_lock on;

            # Hide upstream CORS headers to prevent duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;

            # CORS Headers for browser playback (HLS.js)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # Handle OPTIONS preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
            }
        }

        # Tüm ana trafiği yönet — bot ise prerender, değilse frontend
        location / {
            # Bot ise API prerender'a yönlendir
            if ($is_bot) {
                rewrite ^/(.*)$ /api/prerender/$1 break;
                proxy_pass http://api:3000;
            }

            # Normal kullanıcı ise Frontend konteynerine devret
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Critical for large file uploads passing through
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 60s;
        }
    }
}
